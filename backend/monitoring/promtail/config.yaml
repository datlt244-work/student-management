server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Đọc Docker container logs (stdout JSON) ───────────────────
  # Spring Boot ghi JSON ra stdout → Docker capture → Promtail đọc
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Chỉ scrape container có label logging=true
      - source_labels: [__meta_docker_container_label_logging]
        regex: "true"
        action: keep
      # Lấy tên container làm label
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      # Lấy label app từ docker-compose
      - source_labels: [__meta_docker_container_label_app]
        target_label: app

    pipeline_stages:
      # Parse JSON log từ LogstashEncoder
      - json:
          expressions:
            level: level
            logger: logger_name
            message: message
            thread: thread_name
      # Gán label level để filter nhanh trong Grafana
      - labels:
          level:
          logger:
