server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Đọc log file từ Spring Boot ──────────────────────────────
  - job_name: spring-boot-file
    static_configs:
      - targets:
          - localhost
        labels:
          job: student-management
          app: backend
          env: production
          __path__: /var/log/app/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger_name
            message: message
            thread: thread_name
            timestamp: "@timestamp"
      - labels:
          level:
          logger:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  # ── Đọc Docker container logs (stdout) ───────────────────────
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      - source_labels: [__meta_docker_container_label_app]
        target_label: app
